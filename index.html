<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Mizza</title>
 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-zinc-950 text-white">

    <!-- HEADER -->
    <header
        class="flex items-center justify-between px-[80px] py-[25px] border-b border-zinc-800 sticky top-0 bg-zinc-950/90 backdrop-blur-xl z-50">

        <div class="flex items-center gap-3">
            <div
                class="w-[55px] h-[55px] rounded-full bg-orange-500 flex items-center justify-center text-[28px] shadow-lg shadow-orange-500/30">
                🍕
            </div>

            <div>
                <h1 class="text-[28px] font-black tracking-wide text-orange-500">
                    Pizza Mizza
                </h1>

                <p class="text-zinc-400 text-[14px]">
                    Hot & Fresh Pizza
                </p>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="w-[420px]">
            <input type="text" placeholder="Search pizza..."
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full px-6 py-3 outline-none focus:border-orange-500 duration-300 placeholder:text-zinc-500" />
        </div>

    </header>

    <!-- HERO -->
    <section class="px-[80px] pt-[50px]">

        <div
            class="w-full h-[350px] rounded-[40px] bg-gradient-to-r from-orange-600 to-red-600 flex items-center justify-between px-[60px] overflow-hidden">

            <div class="max-w-[500px]">
                <h1 class="text-[65px] leading-[70px] font-black">
                    Cheesy <br />
                    Pizza Time 🍕
                </h1>

                <p class="mt-5 text-zinc-100 text-[18px]">
                    Fresh ingredients, crispy dough and extra cheese.
                    Order your favorite pizza now.
                </p>

                <button
                    class="mt-7 bg-white text-black px-7 py-3 rounded-full font-bold hover:scale-105 duration-300 cursor-pointer">
                    Order Now
                </button>
            </div>

            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop"
                class="w-[420px] rounded-[30px] rotate-[6deg] shadow-2xl" />
        </div>

    </section>

    <!-- TITLE -->
    <section class="px-[80px] mt-[60px] flex items-center justify-between">

        <h1 id="totalData" class="text-[34px] font-black">
            Total Products : <span class="text-orange-500">1</span>
        </h1>

        <div class="flex gap-3">

            <button
                class="bg-orange-500 px-5 py-2 rounded-full font-semibold hover:scale-105 duration-300 cursor-pointer">
                All
            </button>

            <button
                class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full hover:bg-zinc-800 duration-300 cursor-pointer">
                Pizza
            </button>

            <button
                class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full hover:bg-zinc-800 duration-300 cursor-pointer">
                Drinks
            </button>

            <button
                class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full hover:bg-zinc-800 duration-300 cursor-pointer">
                Dessert
            </button>

        </div>

    </section>

    <!-- CARDS -->
    <section id="carts"
        class="px-[80px] py-[50px] grid grid-cols-4 gap-8">
    </section>



<div id="modal" class="hidden"></div>

<script src="./main.js"></script>
</body>

</html>
